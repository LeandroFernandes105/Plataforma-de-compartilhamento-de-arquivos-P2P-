services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "8000:8000"
    environment:
      TRACKER_PORT: "5000"
      PEER_TIMEOUT: "20"
    volumes:
      - tracker_state:/app/peer_state
    networks:
      - private_network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: always
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/home/node/app/src:z
      - /home/node/app/node_modules
    networks:
      - private_network

volumes:
  tracker_state:

networks:
  private_network:
    name: private_network
    driver: bridge